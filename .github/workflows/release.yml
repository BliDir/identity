name: Draft Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: draft-release-main
  cancel-in-progress: false

jobs:
  draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Run make check
        run: make check

      - name: Build
        run: make build

      - name: Determine release bump
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_json="$(
            gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" 2>/dev/null || echo "[]"
          )"

          labels="$(
            printf '%s' "${pr_json}" \
              | python3 -c 'import json, sys; data = json.load(sys.stdin); print("\n".join(label["name"] for label in (data[0].get("labels", []) if data else [])))'
          )"

          pr_number="$(
            printf '%s' "${pr_json}" \
              | python3 -c 'import json, sys; data = json.load(sys.stdin); print(data[0]["number"] if data else "")'
          )"
          pr_title="$(
            printf '%s' "${pr_json}" \
              | python3 -c 'import json, sys; data = json.load(sys.stdin); print(data[0]["title"] if data else "")'
          )"
          pr_author="$(
            printf '%s' "${pr_json}" \
              | python3 -c 'import json, sys; data = json.load(sys.stdin); print(data[0]["user"]["login"] if data else "")'
          )"

          normalized_labels="$(printf '%s\n' "${labels}" | tr '[:upper:]' '[:lower:]')"
          bump="patch"

          if printf '%s\n' "${normalized_labels}" | grep -Eq '^(release:major|type:breaking|breaking-change|breaking)$'; then
            bump="major"
          elif printf '%s\n' "${normalized_labels}" | grep -Eq '^(release:minor|type:feature|feature|enhancement)$'; then
            bump="minor"
          elif printf '%s\n' "${normalized_labels}" | grep -Eq '^(release:patch|type:bug|bug|fix)$'; then
            bump="patch"
          fi

          echo "bump=${bump}" >> "${GITHUB_OUTPUT}"
          echo "labels<<EOF" >> "${GITHUB_OUTPUT}"
          printf '%s\n' "${labels}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"
          echo "pr_number=${pr_number}" >> "${GITHUB_OUTPUT}"
          echo "pr_title=${pr_title}" >> "${GITHUB_OUTPUT}"
          echo "pr_author=${pr_author}" >> "${GITHUB_OUTPUT}"
          echo "Detected release bump: ${bump}"

      - name: Calculate next release version
        id: release
        env:
          RELEASE_BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          git fetch --force --tags origin

          python3 <<'PY' >> "${GITHUB_OUTPUT}"
          import os
          import re
          import subprocess

          stable_semver = re.compile(r"^v?(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$")

          def git_lines(*args):
              output = subprocess.check_output(["git", *args], text=True)
              return [line.strip() for line in output.splitlines() if line.strip()]

          def parse_tag(tag):
              match = stable_semver.match(tag)
              if not match:
                  return None
              return tuple(int(part) for part in match.groups())

          head_tags = []
          for tag in git_lines("tag", "--points-at", "HEAD"):
              version = parse_tag(tag)
              if version is not None:
                  head_tags.append((version, tag))

          if head_tags:
              version, tag = max(head_tags)
              previous_tag = tag
          else:
              bump = os.environ["RELEASE_BUMP"]
              versions = []
              tags_by_version = {}
              for tag in git_lines("tag", "--list"):
                  version = parse_tag(tag)
                  if version is not None:
                      versions.append(version)
                      tags_by_version[version] = tag

              if versions:
                  major, minor, patch = max(versions)
                  previous_tag = tags_by_version[(major, minor, patch)]
                  if bump == "major":
                      version = (major + 1, 0, 0)
                  elif bump == "minor":
                      version = (major, minor + 1, 0)
                  else:
                      version = (major, minor, patch + 1)
              else:
                  previous_tag = ""
                  version = (0, 1, 0)

              tag = f"v{version[0]}.{version[1]}.{version[2]}"

          version_text = f"{version[0]}.{version[1]}.{version[2]}"
          print(f"version={version_text}")
          print(f"tag={tag}")
          print(f"bump={os.environ['RELEASE_BUMP']}")
          print(f"previous_tag={previous_tag}")
          PY

      - name: Write release notes
        env:
          PREVIOUS_TAG: ${{ steps.release.outputs.previous_tag }}
          PR_NUMBER: ${{ steps.bump.outputs.pr_number }}
          PR_TITLE: ${{ steps.bump.outputs.pr_title }}
          PR_AUTHOR: ${{ steps.bump.outputs.pr_author }}
        run: |
          if [ -n "${PREVIOUS_TAG}" ]; then
            contributor_range="${PREVIOUS_TAG}..HEAD"
          else
            contributor_range="HEAD"
          fi

          contributors="$(
            git log "${contributor_range}" --format='%aN <%aE>' \
              | sort -fu \
              | sed 's/^/- /'
          )"

          if [ -z "${contributors}" ]; then
            contributors="- No commit contributors detected."
          fi

          pr_source="- No merged pull request detected for this commit."
          if [ -n "${PR_NUMBER}" ]; then
            pr_source="- #${PR_NUMBER} ${PR_TITLE} by @${PR_AUTHOR}"
          fi

          cat > release-notes.md <<EOF
          ## Why

          This draft release was created automatically after changes were merged into \`main\`.

          ## What is in this release

          - Identity service changes merged into \`main\`.
          - Verified with \`make check\`.
          - Verified with \`make build\`.
          - Release bump: \`${{ steps.release.outputs.bump }}\`.

          ## Source

          Commit: ${GITHUB_SHA}

          ## Merged Pull Request

          ${pr_source}

          ## Contributors

          ${contributors}
          EOF

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          release_json="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              --jq ".[] | select(.tag_name == \"${TAG_NAME}\")" 2>/dev/null || true
          )"

          release_id="$(printf '%s' "${release_json}" | python3 -c 'import json, sys; raw = sys.stdin.read().strip(); print(json.loads(raw)["id"] if raw else "")')"
          release_draft="$(printf '%s' "${release_json}" | python3 -c 'import json, sys; raw = sys.stdin.read().strip(); print(str(json.loads(raw)["draft"]).lower() if raw else "missing")')"

          if [ "${release_draft}" = "false" ]; then
            echo "Release ${TAG_NAME} is already published; skipping draft update."
            exit 0
          fi

          if [ "${release_draft}" = "true" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -f tag_name="${TAG_NAME}" \
              -f target_commitish="${GITHUB_SHA}" \
              -f name="${TAG_NAME}" \
              -F draft=true \
              -F prerelease=false \
              -f body="$(cat release-notes.md)" >/dev/null
          else
            gh api "repos/${GITHUB_REPOSITORY}/releases" \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -f tag_name="${TAG_NAME}" \
              -f target_commitish="${GITHUB_SHA}" \
              -f name="${TAG_NAME}" \
              -F draft=true \
              -F prerelease=false \
              -f body="$(cat release-notes.md)" >/dev/null
          fi
