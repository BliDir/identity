name: Draft Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: draft-release-main
  cancel-in-progress: false

jobs:
  draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Run make check
        run: make check

      - name: Build
        run: make build

      - name: Calculate next release version
        id: release
        run: |
          git fetch --force --tags origin

          python3 <<'PY' >> "${GITHUB_OUTPUT}"
          import re
          import subprocess

          stable_semver = re.compile(r"^v?(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$")

          def git_lines(*args):
              output = subprocess.check_output(["git", *args], text=True)
              return [line.strip() for line in output.splitlines() if line.strip()]

          def parse_tag(tag):
              match = stable_semver.match(tag)
              if not match:
                  return None
              return tuple(int(part) for part in match.groups())

          head_tags = []
          for tag in git_lines("tag", "--points-at", "HEAD"):
              version = parse_tag(tag)
              if version is not None:
                  head_tags.append((version, tag))

          if head_tags:
              version, tag = max(head_tags)
          else:
              versions = []
              for tag in git_lines("tag", "--list"):
                  version = parse_tag(tag)
                  if version is not None:
                      versions.append(version)

              if versions:
                  major, minor, patch = max(versions)
                  version = (major, minor, patch + 1)
              else:
                  version = (0, 1, 0)

              tag = f"v{version[0]}.{version[1]}.{version[2]}"

          version_text = f"{version[0]}.{version[1]}.{version[2]}"
          print(f"version={version_text}")
          print(f"tag={tag}")
          PY

      - name: Write release notes
        run: |
          cat > release-notes.md <<EOF
          ## Why

          This draft release was created automatically after changes were merged into \`main\`.

          ## What is in this release

          - Identity service changes merged into \`main\`.
          - Verified with \`make check\`.
          - Verified with \`make build\`.

          ## Source

          Commit: ${GITHUB_SHA}
          EOF

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          release_state="$(gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft' 2>/dev/null || echo missing)"

          if [ "${release_state}" = "false" ]; then
            echo "Release ${TAG_NAME} is already published; skipping draft update."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --force "${TAG_NAME}" "${GITHUB_SHA}"
          git push --force origin "refs/tags/${TAG_NAME}"

          if [ "${release_state}" = "true" ]; then
            gh release edit "${TAG_NAME}" \
              --draft \
              --title "${TAG_NAME}" \
              --notes-file release-notes.md
          else
            gh release create "${TAG_NAME}" \
              --draft \
              --title "${TAG_NAME}" \
              --notes-file release-notes.md \
              --target "${GITHUB_SHA}"
          fi
