name: CI

on:
  pull_request:
  push:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Make Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Run make check
        id: make_check
        continue-on-error: true
        run: make check

      - name: Update PR labels
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const managedLabels = {
              "ci:passed": {
                color: "0E8A16",
                description: "All CI checks passed"
              },
              "ci:format-failed": {
                color: "D93F0B",
                description: "Rust formatting check failed"
              },
              "ci:lint-failed": {
                color: "D93F0B",
                description: "Clippy lint check failed"
              },
              "ci:test-failed": {
                color: "D93F0B",
                description: "Test suite failed"
              },
              "ci:check-failed": {
                color: "D93F0B",
                description: "make check failed"
              }
            };

            for (const [name, metadata] of Object.entries(managedLabels)) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: metadata.color,
                  description: metadata.description
                });
              }
            }

            const releaseLabels = {
              "type:bug": {
                color: "D73A4A",
                description: "Bug fix; draft release workflow uses a patch version bump"
              },
              "type:feature": {
                color: "A2EEEF",
                description: "Feature change; draft release workflow uses a minor version bump"
              },
              "release:patch": {
                color: "C2E0C6",
                description: "Force a patch version bump for the next draft release"
              },
              "release:minor": {
                color: "BFDADC",
                description: "Force a minor version bump for the next draft release"
              },
              "release:major": {
                color: "5319E7",
                description: "Force a major version bump for the next draft release"
              },
              "breaking-change": {
                color: "5319E7",
                description: "Breaking change; draft release workflow uses a major version bump"
              }
            };

            for (const [name, metadata] of Object.entries(releaseLabels)) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: metadata.color,
                  description: metadata.description
                });
              }
            }

            const makeCheckFailed = "${{ steps.make_check.outcome }}" === "failure";

            const labelsToAdd = [];

            if (makeCheckFailed) {
              labelsToAdd.push("ci:check-failed");
            }

            if (!makeCheckFailed) {
              labelsToAdd.push("ci:passed");
            }

            for (const name of Object.keys(managedLabels)) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: labelsToAdd
              });
            }

      - name: Fail workflow on check error
        if: steps.make_check.outcome == 'failure'
        run: exit 1
