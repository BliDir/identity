name: CI

on:
  pull_request:
  push:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Make Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Run make check
        id: make_check
        continue-on-error: true
        run: make check

      - name: Install coverage tooling
        id: coverage_tooling
        continue-on-error: true
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked

      - name: Run make coverage
        id: coverage
        if: steps.coverage_tooling.outcome == 'success'
        continue-on-error: true
        run: make coverage

      - name: Update PR labels
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const statusLabels = {
              "ci:passed": {
                color: "0E8A16",
                description: "All CI checks passed"
              },
              "ci:check-failed": {
                color: "D93F0B",
                description: "make check failed"
              },
              "ci:coverage-failed": {
                color: "D93F0B",
                description: "Code coverage is below 80% or coverage tooling failed"
              }
            };

            for (const [name, metadata] of Object.entries(statusLabels)) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: metadata.color,
                  description: metadata.description
                });
              }
            }

            const releaseLabels = {
              "type:bug": {
                color: "D73A4A",
                description: "Bug fix; draft release workflow uses a patch version bump"
              },
              "type:feature": {
                color: "A2EEEF",
                description: "Feature change; draft release workflow uses a minor version bump"
              },
              "release:patch": {
                color: "C2E0C6",
                description: "Force a patch version bump for the next draft release"
              },
              "release:minor": {
                color: "BFDADC",
                description: "Force a minor version bump for the next draft release"
              },
              "release:major": {
                color: "5319E7",
                description: "Force a major version bump for the next draft release"
              },
              "breaking-change": {
                color: "5319E7",
                description: "Breaking change; draft release workflow uses a major version bump"
              }
            };

            for (const [name, metadata] of Object.entries(releaseLabels)) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: metadata.color,
                  description: metadata.description
                });
              }
            }

            const makeCheckFailed = "${{ steps.make_check.outcome }}" === "failure";
            const coverageToolingFailed = "${{ steps.coverage_tooling.outcome }}" === "failure";
            const coverageFailed = "${{ steps.coverage.outcome }}" === "failure";
            const latestStatusLabel = makeCheckFailed
              ? "ci:check-failed"
              : coverageToolingFailed || coverageFailed
                ? "ci:coverage-failed"
                : "ci:passed";

            const currentLabels = await github.paginate(github.rest.issues.listLabelsOnIssue, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            for (const label of currentLabels) {
              if (!label.name.startsWith("ci:")) {
                continue;
              }

              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name: label.name
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [latestStatusLabel]
            });

      - name: Fail workflow on check or coverage error
        if: steps.make_check.outcome == 'failure' || steps.coverage_tooling.outcome == 'failure' || steps.coverage.outcome == 'failure'
        run: exit 1
