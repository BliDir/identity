services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUST_VERSION: "1.95.0"
        DEBIAN_VERSION: "trixie"
    environment:
      DATABASE_URL: postgres://identity:identity@postgres:5432/identity
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.3-trixie
    environment:
      POSTGRES_DB: identity
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity -d identity"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
